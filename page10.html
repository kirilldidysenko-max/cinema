<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>JavaScript</title>
    </head>
    <body>
        
        <style>
        .topic{
            font-size: 40px;
            text-align: center;
            margin-top: 50px;
            margin-bottom: 20px;
            color: palevioletred;
            text-shadow: 2px 2px 2px black;
        }
        .rule{
            font-size: 20px;
            line-height: 35px;
            font-family: cursive;
            width: 20%;
            margin: auto;
            margin-bottom: 15px;
        }
        #guessfield{
        display: block;
        width: 10%;
        margin: 10px auto;
        padding: 7px;
        border-radius: 15px;
        border: 2px solid purple;
        font-size: 20px;
        color: purple;
        }   
        .btn{
            padding: 10px;
            border-radius: 15px;
            background-color: green;
            color: white;
            text-shadow: 2px 2px 2px black;
            width: 15%;
            margin: 800px;
            margin-top: 25px;
            font-size: 20px;
            border: none;
            transition: 2.0;
        }
        .btn:hover{
         background-color: lawngreen;
         color: yellow;
        }
        </style>
        <h1 class="topic">guess the number</h1>
        <p class="rule">try guess the number from 0-10</p>
        <input type="number" id="guessfield" placeholder="your number">
        <button class="btn" onclick="checkgess()" >try</button>


         <script>
            function checkgess() {
        let comp_min = 0
        let comp_max = 10
        let random_number = Math.floor(Math.random()*(comp_max-comp_min+1))+comp_min
        let user_number = parseInt(document.getElementById("guessfield").value)
        
        if(random_number == user_number) {
            alert("congratulation you win")
        } else{
            alert("you dont win luck next time number was "+random_number)
        }
        }




































        


             
             
        </script>       
        
        
    </body>
</html>
